<!-- standings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scoonies - Tournament Standings</title>

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="The Scoonies">
    <meta property="og:url" content="https://scoonies.com/standings.html">
    <meta property="og:title" content="The Scoonies - Tournament Standings">
    <meta property="og:description" content="Check the current standings for The Scoonies NCAA Tournament Pool.">
    <meta property="og:image" content="https://scoonies.com/images/Scoonies.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="The Scoonies - Tournament Standings">
    <meta name="twitter:description" content="Check the current standings for The Scoonies NCAA Tournament Pool.">
    <meta name="twitter:image" content="https://scoonies.com/images/Scoonies.jpg">

    <link rel="stylesheet" href="/css/style.css">
    <style>
        .main-title {
            text-align: center;
            font-size: 36px;
            color: #dc3545;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .standings-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .standings-filter {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 10px;
        }

        .standings-search {
            padding: 7px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 240px;
        }

        .standings-search:focus {
            outline: none;
            border-color: #dc3545;
            box-shadow: 0 0 0 2px rgba(220,53,69,0.15);
        }

        .no-search-results {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-style: italic;
        }
        
        .entry-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        
        .entry-rank {
            font-size: 28px;
            font-weight: bold;
            color: #dc3545;
            padding: 0 15px;
            min-width: 80px;
            text-align: center;
        }
        
        .entry-info {
            flex-grow: 1;
        }
        
        .entry-nickname {
            font-size: 20px;
            font-weight: bold;
        }
        
        .entry-player {
            font-size: 14px;
            color: #6c757d;
        }
        
        .entry-score {
            font-size: 24px;
            font-weight: bold;
            background-color: #dc3545;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
        }

        .max-score-btn {
            font-size: 22px;
            background: none;
            border: none;
            cursor: pointer;
            color: #6c757d;
            padding: 4px 8px;
            margin-left: 8px;
            line-height: 1;
            transition: color 0.15s;
            title: "Max possible score";
        }
        .max-score-btn:hover { color: #dc3545; }

        /* Modal */
        .max-modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .max-modal-backdrop.open { display: flex; }
        .max-modal {
            background: #fff;
            border-radius: 10px;
            max-width: 520px;
            width: 92%;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }
        .max-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px 12px;
            border-bottom: 1px solid #ddd;
        }
        .max-modal-header h2 { margin: 0; font-size: 18px; }
        .max-modal-close {
            background: none; border: none; font-size: 22px;
            cursor: pointer; color: #6c757d; line-height: 1;
        }
        .max-modal-scores {
            display: flex;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid #eee;
        }
        .max-modal-score-box {
            flex: 1;
            text-align: center;
            background: #f8f9fa;
            border-radius: 6px;
            padding: 10px;
        }
        .max-modal-score-box .label { font-size: 11px; color: #6c757d; text-transform: uppercase; letter-spacing: 0.05em; }
        .max-modal-score-box .value { font-size: 26px; font-weight: bold; color: #dc3545; }
        .max-modal-score-box.highlight { background: #dc3545; }
        .max-modal-score-box.highlight .label { color: rgba(255,255,255,0.8); }
        .max-modal-score-box.highlight .value { color: #fff; }
        .max-modal-scenario { padding: 16px 20px; }
        .max-modal-scenario h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; color: #6c757d; margin: 0 0 12px; }
        .scenario-team-block {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .scenario-team-block:last-child { border-bottom: none; }
        .scenario-team-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }
        .scenario-team-name { flex: 1; font-size: 14px; }
        .scenario-seed { color: #6c757d; font-weight: normal; font-size: 13px; }
        .scenario-region-tag { font-size: 11px; color: #adb5bd; white-space: nowrap; }
        .scenario-team-pts { font-weight: bold; color: #28a745; white-space: nowrap; font-size: 14px; }
        .scenario-team-wins { font-size: 12px; color: #495057; margin-bottom: 2px; }
        .scenario-team-breakdown { font-size: 11px; color: #adb5bd; font-family: monospace; margin-bottom: 3px; }
        .scenario-team-clash { font-size: 12px; color: #856404; font-style: italic; }
        .max-modal-loading { text-align: center; padding: 40px; color: #6c757d; }
        .max-modal-eliminated { text-align: center; padding: 24px; color: #6c757d; font-style: italic; }
        .max-modal-methodology { border-top: 1px solid #dee2e6; margin-top: 8px; padding: 10px 16px 4px; }
        .methodology-toggle { background: none; border: none; cursor: pointer; font-size: 12px; color: #6c757d; padding: 0; display: flex; align-items: center; gap: 5px; }
        .methodology-toggle:hover { color: #343a40; }
        .max-modal-methodology.open .methodology-toggle { color: #343a40; }
        .max-modal-methodology.open .methodology-toggle::first-letter { content: '▼'; }
        .methodology-body { display: none; padding-top: 8px; }
        .max-modal-methodology.open .methodology-body { display: block; }
        .methodology-body p { font-size: 12px; color: #495057; margin: 0 0 8px; line-height: 1.5; }
        
        .entry-teams {
            padding: 15px;
        }
        
        .team-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .team-item {
            display: flex;
            flex-direction: column;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f8f9fa;
        }

        .team-main-row {
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .team-item.eliminated {
            color: #999;
            background-color: #f1f1f1;
        }

        .team-item.eliminated .team-seed,
        .team-item.eliminated .team-name,
        .team-item.eliminated .team-region {
            text-decoration: line-through;
        }
        
        .team-seed {
            min-width: 25px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .team-logo {
            width: 25px;
            height: 25px;
            margin-right: 8px;
        }
        
        .team-region {
            color: #6c757d;
            font-size: 0.9em;
            margin-left: 5px;
        }
        
        .team-points {
            font-weight: bold;
            color: #28a745;
            margin-left: auto;
            padding-left: 8px;
        }

        /* ── Status dot + colored points ── */
        .team-status-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
            padding-left: 8px;
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.alive {
            background: #28a745;
            box-shadow: 0 0 5px 2px rgba(40,167,69,0.7);
            animation: pulse-green 2s ease-in-out infinite;
        }

        .status-dot.elim {
            background: #dc3545;
            box-shadow: 0 0 4px 2px rgba(220,53,69,0.5);
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 5px 2px rgba(40,167,69,0.7); }
            50%       { box-shadow: 0 0 10px 5px rgba(40,167,69,1); }
        }

        .team-points.alive { color: #28a745; }
        .team-points.elim  { color: #dc3545; }

        .team-breakdown {
            font-size: 0.68em;
            color: #6c757d;
            font-family: monospace;
            white-space: nowrap;
            margin-top: 3px;
            padding-left: 2px;
        }
        
        .no-entries-message {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-style: italic;
        }
        
        .tournament-status {
            text-align: center;
            font-size: 1em;
            color: #495057;
            margin-bottom: 18px;
            font-style: italic;
        }

        .loading-message {
            text-align: center;
            padding: 40px;
        }
        .payment-status {
            margin-left: 8px;
            font-size: 0.9em;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .payment-status.paid {
            background-color: #d4edda;
            color: #155724;
        }

        .payment-status.unpaid {
            background-color: #f8d7da;
            color: #721c24;
        }

        /* ── Shittalking Corner banner ── */
        .shittalk-banner {
            border-radius: 6px;
            margin-bottom: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 42px;
            box-shadow: 0 3px 14px rgba(0,0,0,0.35);
        }
        .shittalk-banner .banner-label {
            background: rgba(0,0,0,0.35);
            color: #fff;
            font-size: 0.62rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0 14px;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
            border-right: 1px solid rgba(255,255,255,0.3);
            gap: 5px;
            line-height: 1.2;
            text-align: center;
        }
        .shittalk-banner .banner-track {
            flex: 1;
            overflow: hidden;
            height: 100%;
            display: flex;
            align-items: center;
        }
        .shittalk-banner .banner-scroll {
            display: inline-block;
            white-space: nowrap;
            color: #fff;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.02em;
            padding-right: 80px;
            animation: shittalkScroll 22s linear infinite;
            text-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
        @keyframes shittalkScroll {
            0%   { transform: translateX(var(--banner-start, 600px)); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <!-- Max Score Modal -->
    <div id="maxModalBackdrop" class="max-modal-backdrop">
        <div class="max-modal">
            <div class="max-modal-header">
                <h2 id="maxModalTitle">𝔐 Max Possible Score</h2>
                <button id="maxModalClose" class="max-modal-close">✕</button>
            </div>
            <div id="maxModalBody"></div>
        </div>
    </div>

    <header>
        <div class="header-top">
            <a href="/"><img src="../images/Scoonies.jpg" alt="The Scoonies Logo"></a>
        </div>
        <nav>
            <a href="/">About</a>
            <a href="/submit.html">Make a Scoonie</a>
            <a href="/standings.html" class="active">Standings</a>
            <a href="/bracket.html">Bracket</a>
            <a href="/admin">Admin</a>
        </nav>
    </header>
    
    <main>
        <!-- Seling's Shit-talking Corner -->
        <div id="shittalkBanner" class="shittalk-banner" style="display:none;">
            <div class="banner-label">🔥 Seling's<br>Shit-talking Corner</div>
            <div class="banner-track">
                <span class="banner-scroll" id="shittalkMessage"></span>
            </div>
        </div>

        <h1 class="main-title">Standings</h1>
        <div id="tournamentStatus" class="tournament-status"></div>

        <div class="standings-container">
            <div class="standings-filter">
                <div style="position:relative;display:inline-block;">
                    <input type="text" id="searchInput" class="standings-search" placeholder="Search by name or email…">
                    <button id="clearSearch" title="Clear search" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1rem;cursor:pointer;color:#6c757d;padding:0;line-height:1;">✕</button>
                </div>
                <button id="refreshBtn" class="action-button">Refresh Standings</button>
            </div>

            <div id="standingsContent" class="standings-content">
                <div class="loading-message">Loading standings...</div>
            </div>
        </div>
    </main>
    
    <footer>
        <p>&copy; <script>document.write(new Date().getFullYear())</script> The Scoonies</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load standings data
            loadStandings();

            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', loadStandings);

            // Search filter
            const searchInput = document.getElementById('searchInput');
            const clearSearchBtn = document.getElementById('clearSearch');

            function applySearch(query) {
                const q = query.trim().toLowerCase();
                const cards = document.querySelectorAll('#standingsContent .entry-card');
                let anyVisible = false;
                cards.forEach(card => {
                    const matches = !q || card.dataset.search.includes(q);
                    card.style.display = matches ? '' : 'none';
                    if (matches) anyVisible = true;
                });
                clearSearchBtn.style.display = q ? 'block' : 'none';
                let noResults = document.getElementById('noSearchResults');
                if (!anyVisible && q) {
                    if (!noResults) {
                        noResults = document.createElement('div');
                        noResults.id = 'noSearchResults';
                        noResults.className = 'no-search-results';
                        noResults.textContent = 'No entries match your search.';
                        document.getElementById('standingsContent').appendChild(noResults);
                    }
                    noResults.style.display = '';
                } else if (noResults) {
                    noResults.style.display = 'none';
                }
            }

            searchInput.addEventListener('input', function() { applySearch(this.value); });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') { this.value = ''; applySearch(''); this.blur(); }
            });

            clearSearchBtn.addEventListener('click', function() {
                searchInput.value = '';
                applySearch('');
                searchInput.focus();
            });
        });
        
        function maskEmail(email) {
            if (!email || email.length <= 10) return 'email hidden';
            const atIndex = email.indexOf('@');
            if (atIndex <= 4) {
                return email.substring(0, atIndex) + '...@...' + email.substring(atIndex + 1);
            }
            return `${email.substring(0, 4)}...@...${email.substring(email.length - 6)}`;
        }

        // Ordinal suffix helper: 1 → "1st", 2 → "2nd", etc.
        function ordinal(n) {
            const s = ['th','st','nd','rd'];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        // Build a scoring breakdown formula string for a team
        function buildBreakdown(team) {
            const s = team.seed;
            const r = team.round_reached || 1;
            const elimPart = team.is_eliminated ? `Eliminated in the ${ordinal(r)} round` : '';

            if (r <= 1 || !team.points_earned) {
                return elimPart;
            }

            const terms = [];
            for (let i = 1; i <= r - 1; i++) {
                terms.push(`(${s}\u00d7${i})`);
            }

            const bonuses = [];
            if (r >= 5) bonuses.push('+5 FF');
            if (r >= 6) bonuses.push('+10 CG');
            if (r >= 7) bonuses.push('+15 Champ');

            let formula = `(${terms.join('+')})`;
            if (bonuses.length) formula += ' ' + bonuses.join(', ');
            if (elimPart) formula += ' · ' + elimPart;
            return formula;
        }

        // Load standings from the server
        function loadStandings() {
            fetch('/api/standings')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load standings');
                    }
                    return response.json();
                })
                .then(data => {
                    renderStandings(data);
                })
                .catch(error => {
                    console.error('Error loading standings:', error);
                    document.getElementById('standingsContent').innerHTML = 
                        '<div class="error">Error loading standings. Please try again later.</div>';
                });
        }
        
        function renderStandings(data) {
            const standingsContent = document.getElementById('standingsContent');
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').style.display = 'none';

            // Update tournament status line
            const statusEl = document.getElementById('tournamentStatus');
            if (data.tournamentStatus) {
                const { currentRound, gamesCompleted, totalGames, roundName } = data.tournamentStatus;
                if (currentRound === null) {
                    statusEl.textContent = 'Tournament Complete';
                } else if (gamesCompleted === 0 && currentRound === 1) {
                    statusEl.textContent = 'Tournament has not yet begun';
                } else {
                    statusEl.textContent = `After ${gamesCompleted} of ${totalGames} games reported in ${roundName}`;
                }
            }

            // Sort entries by score (highest first)
            const sortedEntries = data.entries.sort((a, b) => b.score - a.score);
            
            if (sortedEntries.length === 0) {
                standingsContent.innerHTML = '<div class="no-entries-message">No entries yet. Be the first to submit!</div>';
                return;
            }
            
            // Check if teams are visible
            const teamsVisible = data.teamsVisible !== false; // Default to visible if not specified
            
            // Clear previous content
            standingsContent.innerHTML = '';
            
            // If teams are hidden, show a notice at the top
            if (!teamsVisible) {
                const noticeDiv = document.createElement('div');
                noticeDiv.className = 'hidden-teams-notice';
                noticeDiv.innerHTML = `
                    <div style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                        <h3 style="margin-top: 0;">Team Selections Currently Hidden</h3>
                        <p style="margin-bottom: 0;">The commissioner has chosen to hide team selections until the tournament begins. Check back later to see which teams were selected.</p>
                    </div>
                `;
                standingsContent.appendChild(noticeDiv);
            }
            
            // Calculate standard ranks (1224 — tied entries share the same rank)
            const ranks = [];
            sortedEntries.forEach((entry, index, arr) => {
                if (index === 0 || entry.score !== arr[index - 1].score) {
                    ranks.push(index + 1);
                } else {
                    ranks.push(ranks[index - 1]);
                }
            });

            // Create entry cards
            const isTournamentComplete = data.tournamentStatus && data.tournamentStatus.currentRound === null;
            sortedEntries.forEach((entry, index) => {
                const entryCard = document.createElement('div');
                entryCard.className = 'entry-card';
                entryCard.dataset.search = `${entry.player_name} ${entry.nickname} ${entry.email}`.toLowerCase();

                // Entry header
                const entryHeader = document.createElement('div');
                entryHeader.className = 'entry-header';

                const entryRank = document.createElement('div');
                entryRank.className = 'entry-rank';
                const rank = ranks[index];
                const trophyMap = { 1: '🥇', 2: '🥈', 3: '🥉' };
                const trophy = isTournamentComplete && rank <= 3 ? trophyMap[rank] + ' ' : '';
                entryRank.textContent = `${trophy}#${rank}`;
                
                const entryInfo = document.createElement('div');
                entryInfo.className = 'entry-info';
                
                const entryNickname = document.createElement('div');
                entryNickname.className = 'entry-nickname';
                entryNickname.textContent = entry.nickname;
                
                const entryPlayer = document.createElement('div');
                entryPlayer.className = 'entry-player';
                entryPlayer.textContent = `${entry.player_name} (${maskEmail(entry.email)})`;

                entryInfo.appendChild(entryNickname);
                entryInfo.appendChild(entryPlayer);
                
                const entryScore = document.createElement('div');
                entryScore.className = 'entry-score';
                entryScore.textContent = `${entry.score} pts`;
                
                // Add payment status indicator
                if (entry.has_paid !== undefined) {
                    const paymentStatus = document.createElement('span');
                    paymentStatus.className = entry.has_paid ? 'payment-status paid' : 'payment-status unpaid';
                    paymentStatus.textContent = entry.has_paid ? ' • Paid' : ' • Payment Pending';
                    entryPlayer.appendChild(paymentStatus);
                }
                entryHeader.appendChild(entryRank);
                entryHeader.appendChild(entryInfo);
                entryHeader.appendChild(entryScore);
                //entryHeader.appendChild(paymentStatus);
                
                // Entry teams
                const entryTeams = document.createElement('div');
                entryTeams.className = 'entry-teams';
                
                // Handle teams visibility
                if (entry.teamsHidden) {
                    // Teams are hidden by commissioner
                    const hiddenMessage = document.createElement('div');
                    hiddenMessage.className = 'hidden-teams-message';
                    hiddenMessage.style.padding = '15px';
                    hiddenMessage.style.backgroundColor = '#f8f9fa';
                    hiddenMessage.style.borderRadius = '4px';
                    hiddenMessage.style.textAlign = 'center';
                    hiddenMessage.style.fontStyle = 'italic';
                    hiddenMessage.style.color = '#6c757d';
                    hiddenMessage.textContent = `SELECTIONS HIDDEN BY COMMISSIONER (${entry.teamCount} teams selected)`;
                    entryTeams.appendChild(hiddenMessage);
                } else {
                    // Teams are visible - render normally
                    const teamList = document.createElement('div');
                    teamList.className = 'team-list';
                    
                    // Sort teams by seed
                    const sortedTeams = (entry.teams || []).sort((a, b) => a.seed - b.seed);
                    
                    // Add team items
                    sortedTeams.forEach(team => {
                        const teamItem = document.createElement('div');
                        teamItem.className = 'team-item';
                        
                        if (team.is_eliminated) {
                            teamItem.classList.add('eliminated');
                        }
                        
                        const seedSpan = document.createElement('span');
                        seedSpan.className = 'team-seed';
                        seedSpan.textContent = `#${team.seed}`;
                        
                        const logoImg = document.createElement('img');
                        logoImg.className = 'team-logo';
                        logoImg.alt = team.team_name;
                        logoImg.src = `/images/logos/${team.team_name.toLowerCase().replace(/[^a-z0-9]/g, '-')}.png`;
                        logoImg.onerror = function() {
                            this.onerror = null;
                            this.src = team.logo_url || '/images/Scoonies.jpg';
                        };
                        
                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'team-name';
                        nameSpan.textContent = team.team_name;
                        
                        const regionSpan = document.createElement('span');
                        regionSpan.className = 'team-region';
                        regionSpan.textContent = `(${team.region})`;
                        
                        const mainRow = document.createElement('div');
                        mainRow.className = 'team-main-row';
                        mainRow.appendChild(seedSpan);
                        mainRow.appendChild(logoImg);
                        mainRow.appendChild(nameSpan);
                        mainRow.appendChild(regionSpan);

                        // Status dot + points — colored only once the team has played
                        const hasPlayed = team.round_reached > 1 || team.is_eliminated;
                        const statusWrap = document.createElement('div');
                        statusWrap.className = 'team-status-wrap';

                        if (hasPlayed) {
                            const isAlive = !team.is_eliminated;
                            const dot = document.createElement('span');
                            dot.className = 'status-dot ' + (isAlive ? 'alive' : 'elim');
                            statusWrap.appendChild(dot);
                        }

                        const pointsSpan = document.createElement('span');
                        pointsSpan.className = 'team-points' +
                            (hasPlayed ? (team.is_eliminated ? ' elim' : ' alive') : '');
                        pointsSpan.textContent = `[${team.points_earned} pts]`;
                        statusWrap.appendChild(pointsSpan);

                        mainRow.appendChild(statusWrap);
                        teamItem.appendChild(mainRow);

                        const breakdown = buildBreakdown(team);
                        if (breakdown) {
                            const breakdownDiv = document.createElement('div');
                            breakdownDiv.className = 'team-breakdown';
                            breakdownDiv.textContent = breakdown;
                            teamItem.appendChild(breakdownDiv);
                        }
                        
                        teamList.appendChild(teamItem);
                    });
                    
                    entryTeams.appendChild(teamList);
                }
                
                // 𝔐 max score button
                const maxBtn = document.createElement('button');
                maxBtn.className = 'max-score-btn';
                maxBtn.textContent = '𝔐';
                maxBtn.title = 'Max possible score';
                maxBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openMaxModal(entry);
                });
                entryHeader.appendChild(maxBtn);

                // Add all elements to the card
                entryCard.appendChild(entryHeader);
                entryCard.appendChild(entryTeams);

                // Add card to standings content
                standingsContent.appendChild(entryCard);
            });
        }
        // Max score modal
        function openMaxModal(entry) {
            const backdrop = document.getElementById('maxModalBackdrop');
            const title = document.getElementById('maxModalTitle');
            const body = document.getElementById('maxModalBody');

            title.textContent = `𝔐 — ${entry.nickname}`;
            body.innerHTML = '<div class="max-modal-loading">Calculating...</div>';
            backdrop.classList.add('open');

            fetch(`/api/standings/max-score/${entry.id}`)
                .then(r => r.json())
                .then(data => {
                    if (data.error) { body.innerHTML = `<div class="max-modal-eliminated">${data.error}</div>`; return; }

                    const additional = data.maxAdditional;
                    const eliminated = additional === 0;

                    let html = `
                        <div class="max-modal-scores">
                            <div class="max-modal-score-box">
                                <div class="label">Current</div>
                                <div class="value">${data.currentScore}</div>
                            </div>
                            <div class="max-modal-score-box">
                                <div class="label">Max Additional</div>
                                <div class="value">+${additional}</div>
                            </div>
                            <div class="max-modal-score-box highlight">
                                <div class="label">Max Possible</div>
                                <div class="value">${data.maxScore}</div>
                            </div>
                        </div>`;

                    if (eliminated || data.scenario.length === 0) {
                        html += `<div class="max-modal-eliminated">All teams have been eliminated — no additional points possible.</div>`;
                    } else {
                        const FF_BONUSES = { 5: 5, 6: 10, 7: 15 };
                        const LOSS_ROUND_NAMES = ['','Round of 64','Round of 32','Sweet 16','Elite 8','Final Four','Championship Game','Champion'];

                        // Group events by team, keeping raw events for breakdown
                        const teamData = new Map();
                        data.scenario.forEach(ev => {
                            if (!teamData.has(ev.team)) {
                                teamData.set(ev.team, { team: ev.team, seed: ev.seed, region: ev.region, rounds: [], events: [], totalGain: 0, maxRound: 0 });
                            }
                            const t = teamData.get(ev.team);
                            t.rounds.push(ev.roundName);
                            t.events.push(ev);
                            t.totalGain += ev.gain;
                            if (ev.round > t.maxRound) t.maxRound = ev.round;
                        });

                        // Build points breakdown string: (base gains) + (bonuses) = total
                        teamData.forEach(t => {
                            const baseGains = t.events.map(ev => ev.seed * (ev.round - 1));
                            const bonuses = t.events.filter(ev => FF_BONUSES[ev.round]).map(ev => FF_BONUSES[ev.round]);
                            t.breakdown = bonuses.length
                                ? `(${baseGains.join('+')})\u00a0+\u00a0(${bonuses.join('+')}) = ${t.totalGain}`
                                : `(${baseGains.join('+')}) = ${t.totalGain}`;
                        });

                        // Detect collisions
                        const losesTo = new Map(); // team → { opponent, round }
                        // Same-region: pick with lower maxRound loses to pick with higher maxRound
                        const byRegion = {};
                        teamData.forEach(t => { if (!byRegion[t.region]) byRegion[t.region] = []; byRegion[t.region].push(t); });
                        Object.values(byRegion).forEach(picks => {
                            if (picks.length > 1) {
                                picks.sort((a, b) => a.maxRound - b.maxRound);
                                const winner = picks[picks.length - 1];
                                for (let i = 0; i < picks.length - 1; i++) {
                                    losesTo.set(picks[i].team, { opponent: winner, roundName: LOSS_ROUND_NAMES[picks[i].maxRound + 1] || 'next round' });
                                }
                            }
                        });
                        // FF collisions using semifinal brackets from the API
                        const ffMatchups = data.ffMatchups;
                        if (ffMatchups) {
                            const sfBracket = {};
                            ffMatchups.semifinal1.forEach(r => { sfBracket[r] = 1; });
                            ffMatchups.semifinal2.forEach(r => { sfBracket[r] = 2; });
                            // Teams that won their region (maxRound=5) but don't advance further
                            teamData.forEach(t => {
                                if (t.maxRound === 5 && !losesTo.has(t.team)) {
                                    const sf = sfBracket[t.region];
                                    const sfOpponent = [...teamData.values()].find(o =>
                                        o.team !== t.team && o.maxRound >= 6 && sfBracket[o.region] === sf
                                    );
                                    if (sfOpponent) losesTo.set(t.team, { opponent: sfOpponent, roundName: 'Final Four' });
                                }
                            });
                        }
                        // Championship: maxRound=6 loses to maxRound=7
                        const champion = [...teamData.values()].find(t => t.maxRound === 7);
                        if (champion) {
                            teamData.forEach(t => {
                                if (t.maxRound === 6 && !losesTo.has(t.team))
                                    losesTo.set(t.team, { opponent: champion, roundName: 'Championship Game' });
                            });
                        }

                        const sorted = [...teamData.values()].sort((a, b) => b.totalGain - a.totalGain);

                        html += `<div class="max-modal-scenario"><h3>𝔐 Optimal Scenario <span style="font-weight:normal;font-size:11px;color:#adb5bd;">(beta)</span></h3>`;
                        sorted.forEach(t => {
                            const clash = losesTo.get(t.team);
                            const winWord = t.rounds.length === 1 ? 'win' : 'wins';
                            const reachRounds = t.rounds.map(r => r === 'Champion' ? 'win the Championship' : `reach the ${r}`);
                            if (clash) reachRounds.push(`where it will collide with your (${clash.opponent.seed}) ${clash.opponent.team} and must lose`);
                            const winsText = `To optimize points, (${t.seed}) ${t.team} needs ${t.rounds.length} more ${winWord}: ${reachRounds.join(', ')}.`;
                            html += `
                                <div class="scenario-team-block">
                                    <div class="scenario-team-header">
                                        <span class="scenario-team-name"><span class="scenario-seed">(${t.seed})</span> <strong>${t.team}</strong></span>
                                        <span class="scenario-region-tag">${t.region}</span>
                                        <span class="scenario-team-pts">+${t.totalGain} pts</span>
                                    </div>
                                    <div class="scenario-team-wins">${winsText}</div>
                                    <div class="scenario-team-breakdown">${t.breakdown}</div>
                                </div>`;
                        });
                        html += `</div>`;

                        // Show blocked picks (alive but immediately face another pick)
                        if (data.blocked && data.blocked.length > 0) {
                            html += `<div class="max-modal-scenario" style="padding-top:0">`;
                            data.blocked.forEach(b => {
                                html += `
                                    <div class="scenario-team-block">
                                        <div class="scenario-team-header">
                                            <span class="scenario-team-name"><span class="scenario-seed">(${b.seed})</span> <strong>${b.team}</strong></span>
                                            <span class="scenario-region-tag">${b.region}</span>
                                            <span class="scenario-team-pts" style="color:#6c757d">+0 pts</span>
                                        </div>
                                        <div class="scenario-team-clash"><strong>Collision:</strong> must lose to your (${b.blockedBySeed}) ${b.blockedBy} in the ${b.roundName}</div>
                                    </div>`;
                            });
                            html += `</div>`;
                        }
                    }

                    html += `
                        <div class="max-modal-methodology">
                            <button class="methodology-toggle" onclick="const p=this.parentElement; p.classList.toggle('open'); this.childNodes[0].textContent=p.classList.contains('open')?'▼ ':'▶ ';">
                                ▶ How is this calculated?
                            </button>
                            <div class="methodology-body">
                                <p>This calculator looks at every pick you still have alive and traces the best possible path through the remaining bracket.</p>
                                <p><strong>Regional bracket:</strong> When two (or more) of your picks are in the same region, it figures out the latest round they can both win independently before they must face each other — then sends the higher-value pick forward. The other pick still earns points for every win it gets before that collision.</p>
                                <p><strong>Final Four:</strong> It tries all combinations of your picks that could reach the Final Four and the Championship, choosing whichever combination produces the highest total score.</p>
                                <p><strong>The result</strong> is the highest score mathematically possible for your entry given today's bracket state — assuming everything breaks your way.</p>
                            </div>
                        </div>`;

                    body.innerHTML = html;
                })
                .catch(() => { body.innerHTML = '<div class="max-modal-eliminated">Error loading max score.</div>'; });
        }

        document.getElementById('maxModalClose').addEventListener('click', () => {
            document.getElementById('maxModalBackdrop').classList.remove('open');
        });
        document.getElementById('maxModalBackdrop').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
        });

        // Shittalking Corner banner
        fetch('/api/bracket/standings-banner', { cache: 'no-store' })
            .then(r => r.json())
            .then(data => {
                const banner = document.getElementById('shittalkBanner');
                if (data.banner) {
                    const el = document.getElementById('shittalkMessage');
                    el.textContent = data.banner;
                    el.style.color      = data.textColor || '#ffffff';
                    el.style.textShadow = `0 0 8px ${data.textColor || '#ffffff'}88`;
                    banner.style.background = `linear-gradient(to right, color-mix(in srgb, ${data.color} 70%, #000), ${data.color} 40%, ${data.color} 60%, color-mix(in srgb, ${data.color} 70%, #000))`;
                    banner.style.boxShadow  = `0 3px 18px ${data.color}88`;
                    banner.style.display    = 'flex';
                    // Measure the track width AFTER display:flex so layout is ready,
                    // then set the start position and duration based on actual pixels.
                    requestAnimationFrame(() => {
                        const trackWidth = banner.querySelector('.banner-track').offsetWidth;
                        el.style.setProperty('--banner-start', trackWidth + 'px');
                        // ~80px/s feels natural; minimum 8s
                        const totalPx = trackWidth + el.scrollWidth;
                        el.style.animationDuration = Math.max(8, totalPx / 80) + 's';
                    });
                } else {
                    banner.style.display = 'none';
                }
            })
            .catch(() => {});
    </script>
</body>
</html>
