<!-- standings.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scoonies - Tournament Standings</title>

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="The Scoonies">
    <meta property="og:url" content="https://scoonies.com/standings.html">
    <meta property="og:title" content="The Scoonies - Tournament Standings">
    <meta property="og:description" content="Check the current standings for The Scoonies NCAA Tournament Pool.">
    <meta property="og:image" content="https://scoonies.com/images/Scoonies.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="The Scoonies - Tournament Standings">
    <meta name="twitter:description" content="Check the current standings for The Scoonies NCAA Tournament Pool.">
    <meta name="twitter:image" content="https://scoonies.com/images/Scoonies.jpg">

    <link rel="stylesheet" href="/css/style.css">
    <style>
        .main-title {
            text-align: center;
            font-size: 36px;
            color: #dc3545;
            margin-bottom: 30px;
            text-transform: uppercase;
            font-weight: bold;
        }
        
        .standings-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .standings-filter {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 10px;
        }

        .standings-search {
            padding: 7px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 240px;
        }

        .standings-search:focus {
            outline: none;
            border-color: #dc3545;
            box-shadow: 0 0 0 2px rgba(220,53,69,0.15);
        }

        .no-search-results {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-style: italic;
        }
        
        .entry-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: #f8f9fa;
            border-bottom: 1px solid #ddd;
        }
        
        .entry-rank {
            font-size: 28px;
            font-weight: bold;
            color: #dc3545;
            padding: 0 15px;
            min-width: 80px;
            text-align: center;
        }
        
        .entry-info {
            flex-grow: 1;
        }
        
        .entry-nickname {
            font-size: 20px;
            font-weight: bold;
        }
        
        .entry-player {
            font-size: 14px;
            color: #6c757d;
        }
        
        .entry-score {
            font-size: 24px;
            font-weight: bold;
            background-color: #dc3545;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
        }
        
        .entry-teams {
            padding: 15px;
        }
        
        .team-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .team-item {
            display: flex;
            flex-direction: column;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f8f9fa;
        }

        .team-main-row {
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .team-item.eliminated {
            color: #999;
            background-color: #f1f1f1;
        }

        .team-item.eliminated .team-seed,
        .team-item.eliminated .team-name,
        .team-item.eliminated .team-region {
            text-decoration: line-through;
        }
        
        .team-seed {
            min-width: 25px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .team-logo {
            width: 25px;
            height: 25px;
            margin-right: 8px;
        }
        
        .team-region {
            color: #6c757d;
            font-size: 0.9em;
            margin-left: 5px;
        }
        
        .team-points {
            font-weight: bold;
            color: #28a745;
            margin-left: auto;
            padding-left: 8px;
        }

        /* ── Status dot + colored points ── */
        .team-status-wrap {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
            padding-left: 8px;
            flex-shrink: 0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-dot.alive {
            background: #28a745;
            box-shadow: 0 0 5px 2px rgba(40,167,69,0.7);
            animation: pulse-green 2s ease-in-out infinite;
        }

        .status-dot.elim {
            background: #dc3545;
            box-shadow: 0 0 4px 2px rgba(220,53,69,0.5);
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 5px 2px rgba(40,167,69,0.7); }
            50%       { box-shadow: 0 0 10px 5px rgba(40,167,69,1); }
        }

        .team-points.alive { color: #28a745; }
        .team-points.elim  { color: #dc3545; }

        .team-breakdown {
            font-size: 0.68em;
            color: #6c757d;
            font-family: monospace;
            white-space: nowrap;
            margin-top: 3px;
            padding-left: 2px;
        }
        
        .no-entries-message {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-style: italic;
        }
        
        .tournament-status {
            text-align: center;
            font-size: 1em;
            color: #495057;
            margin-bottom: 18px;
            font-style: italic;
        }

        .loading-message {
            text-align: center;
            padding: 40px;
        }
        .payment-status {
            margin-left: 8px;
            font-size: 0.9em;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .payment-status.paid {
            background-color: #d4edda;
            color: #155724;
        }

        .payment-status.unpaid {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="/"><img src="../images/Scoonies.jpg" alt="The Scoonies Logo"></a>
        </div>
        <nav>
            <a href="/">About</a>
            <a href="/submit.html">Make a Scoonie</a>
            <a href="/standings.html" class="active">Standings</a>
            <a href="/bracket.html">Bracket</a>
            <a href="/admin">Admin</a>
        </nav>
    </header>
    
    <main>
        <h1 class="main-title">Standings</h1>
        <div id="tournamentStatus" class="tournament-status"></div>

        <div class="standings-container">
            <div class="standings-filter">
                <div style="position:relative;display:inline-block;">
                    <input type="text" id="searchInput" class="standings-search" placeholder="Search by name or email…">
                    <button id="clearSearch" title="Clear search" style="display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1rem;cursor:pointer;color:#6c757d;padding:0;line-height:1;">✕</button>
                </div>
                <button id="refreshBtn" class="action-button">Refresh Standings</button>
            </div>

            <div id="standingsContent" class="standings-content">
                <div class="loading-message">Loading standings...</div>
            </div>
        </div>
    </main>
    
    <footer>
        <p>&copy; <script>document.write(new Date().getFullYear())</script> The Scoonies</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load standings data
            loadStandings();

            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', loadStandings);

            // Search filter
            const searchInput = document.getElementById('searchInput');
            const clearSearchBtn = document.getElementById('clearSearch');

            function applySearch(query) {
                const q = query.trim().toLowerCase();
                const cards = document.querySelectorAll('#standingsContent .entry-card');
                let anyVisible = false;
                cards.forEach(card => {
                    const matches = !q || card.dataset.search.includes(q);
                    card.style.display = matches ? '' : 'none';
                    if (matches) anyVisible = true;
                });
                clearSearchBtn.style.display = q ? 'block' : 'none';
                let noResults = document.getElementById('noSearchResults');
                if (!anyVisible && q) {
                    if (!noResults) {
                        noResults = document.createElement('div');
                        noResults.id = 'noSearchResults';
                        noResults.className = 'no-search-results';
                        noResults.textContent = 'No entries match your search.';
                        document.getElementById('standingsContent').appendChild(noResults);
                    }
                    noResults.style.display = '';
                } else if (noResults) {
                    noResults.style.display = 'none';
                }
            }

            searchInput.addEventListener('input', function() { applySearch(this.value); });

            searchInput.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') { this.value = ''; applySearch(''); this.blur(); }
            });

            clearSearchBtn.addEventListener('click', function() {
                searchInput.value = '';
                applySearch('');
                searchInput.focus();
            });
        });
        
        function maskEmail(email) {
            if (!email || email.length <= 10) return 'email hidden';
            const atIndex = email.indexOf('@');
            if (atIndex <= 4) {
                return email.substring(0, atIndex) + '...@...' + email.substring(atIndex + 1);
            }
            return `${email.substring(0, 4)}...@...${email.substring(email.length - 6)}`;
        }

        // Ordinal suffix helper: 1 → "1st", 2 → "2nd", etc.
        function ordinal(n) {
            const s = ['th','st','nd','rd'];
            const v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        }

        // Build a scoring breakdown formula string for a team
        function buildBreakdown(team) {
            const s = team.seed;
            const r = team.round_reached || 1;
            const elimPart = team.is_eliminated ? `Eliminated in the ${ordinal(r)} round` : '';

            if (r <= 1 || !team.points_earned) {
                return elimPart;
            }

            const terms = [];
            for (let i = 1; i <= r - 1; i++) {
                terms.push(`(${s}\u00d7${i})`);
            }

            const bonuses = [];
            if (r >= 5) bonuses.push('+5 FF');
            if (r >= 6) bonuses.push('+10 CG');
            if (r >= 7) bonuses.push('+15 Champ');

            let formula = `(${terms.join('+')})`;
            if (bonuses.length) formula += ' ' + bonuses.join(', ');
            if (elimPart) formula += ' · ' + elimPart;
            return formula;
        }

        // Load standings from the server
        function loadStandings() {
            fetch('/api/standings')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Failed to load standings');
                    }
                    return response.json();
                })
                .then(data => {
                    renderStandings(data);
                })
                .catch(error => {
                    console.error('Error loading standings:', error);
                    document.getElementById('standingsContent').innerHTML = 
                        '<div class="error">Error loading standings. Please try again later.</div>';
                });
        }
        
        function renderStandings(data) {
            const standingsContent = document.getElementById('standingsContent');
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearch').style.display = 'none';

            // Update tournament status line
            const statusEl = document.getElementById('tournamentStatus');
            if (data.tournamentStatus) {
                const { currentRound, gamesCompleted, totalGames, roundName } = data.tournamentStatus;
                if (currentRound === null) {
                    statusEl.textContent = 'Tournament Complete';
                } else if (gamesCompleted === 0 && currentRound === 1) {
                    statusEl.textContent = 'Tournament has not yet begun';
                } else {
                    statusEl.textContent = `After ${gamesCompleted} of ${totalGames} games reported in ${roundName}`;
                }
            }

            // Sort entries by score (highest first)
            const sortedEntries = data.entries.sort((a, b) => b.score - a.score);
            
            if (sortedEntries.length === 0) {
                standingsContent.innerHTML = '<div class="no-entries-message">No entries yet. Be the first to submit!</div>';
                return;
            }
            
            // Check if teams are visible
            const teamsVisible = data.teamsVisible !== false; // Default to visible if not specified
            
            // Clear previous content
            standingsContent.innerHTML = '';
            
            // If teams are hidden, show a notice at the top
            if (!teamsVisible) {
                const noticeDiv = document.createElement('div');
                noticeDiv.className = 'hidden-teams-notice';
                noticeDiv.innerHTML = `
                    <div style="background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                        <h3 style="margin-top: 0;">Team Selections Currently Hidden</h3>
                        <p style="margin-bottom: 0;">The commissioner has chosen to hide team selections until the tournament begins. Check back later to see which teams were selected.</p>
                    </div>
                `;
                standingsContent.appendChild(noticeDiv);
            }
            
            // Create entry cards
            sortedEntries.forEach((entry, index) => {
                const entryCard = document.createElement('div');
                entryCard.className = 'entry-card';
                entryCard.dataset.search = `${entry.player_name} ${entry.nickname} ${entry.email}`.toLowerCase();
                
                // Entry header
                const entryHeader = document.createElement('div');
                entryHeader.className = 'entry-header';
                
                const entryRank = document.createElement('div');
                entryRank.className = 'entry-rank';
                const isTournamentComplete = data.tournamentStatus && data.tournamentStatus.currentRound === null;
                const trophies = ['🥇', '🥈', '🥉'];
                const trophy = isTournamentComplete && index < 3 ? trophies[index] + ' ' : '';
                entryRank.textContent = `${trophy}#${index + 1}`;
                
                const entryInfo = document.createElement('div');
                entryInfo.className = 'entry-info';
                
                const entryNickname = document.createElement('div');
                entryNickname.className = 'entry-nickname';
                entryNickname.textContent = entry.nickname;
                
                const entryPlayer = document.createElement('div');
                entryPlayer.className = 'entry-player';
                entryPlayer.textContent = `${entry.player_name} (${maskEmail(entry.email)})`;

                entryInfo.appendChild(entryNickname);
                entryInfo.appendChild(entryPlayer);
                
                const entryScore = document.createElement('div');
                entryScore.className = 'entry-score';
                entryScore.textContent = `${entry.score} pts`;
                
                // Add payment status indicator
                if (entry.has_paid !== undefined) {
                    const paymentStatus = document.createElement('span');
                    paymentStatus.className = entry.has_paid ? 'payment-status paid' : 'payment-status unpaid';
                    paymentStatus.textContent = entry.has_paid ? ' • Paid' : ' • Payment Pending';
                    entryPlayer.appendChild(paymentStatus);
                }
                entryHeader.appendChild(entryRank);
                entryHeader.appendChild(entryInfo);
                entryHeader.appendChild(entryScore);
                //entryHeader.appendChild(paymentStatus);
                
                // Entry teams
                const entryTeams = document.createElement('div');
                entryTeams.className = 'entry-teams';
                
                // Handle teams visibility
                if (entry.teamsHidden) {
                    // Teams are hidden by commissioner
                    const hiddenMessage = document.createElement('div');
                    hiddenMessage.className = 'hidden-teams-message';
                    hiddenMessage.style.padding = '15px';
                    hiddenMessage.style.backgroundColor = '#f8f9fa';
                    hiddenMessage.style.borderRadius = '4px';
                    hiddenMessage.style.textAlign = 'center';
                    hiddenMessage.style.fontStyle = 'italic';
                    hiddenMessage.style.color = '#6c757d';
                    hiddenMessage.textContent = `SELECTIONS HIDDEN BY COMMISSIONER (${entry.teamCount} teams selected)`;
                    entryTeams.appendChild(hiddenMessage);
                } else {
                    // Teams are visible - render normally
                    const teamList = document.createElement('div');
                    teamList.className = 'team-list';
                    
                    // Sort teams by seed
                    const sortedTeams = (entry.teams || []).sort((a, b) => a.seed - b.seed);
                    
                    // Add team items
                    sortedTeams.forEach(team => {
                        const teamItem = document.createElement('div');
                        teamItem.className = 'team-item';
                        
                        if (team.is_eliminated) {
                            teamItem.classList.add('eliminated');
                        }
                        
                        const seedSpan = document.createElement('span');
                        seedSpan.className = 'team-seed';
                        seedSpan.textContent = `#${team.seed}`;
                        
                        const logoImg = document.createElement('img');
                        logoImg.className = 'team-logo';
                        logoImg.alt = team.team_name;
                        logoImg.src = `/images/logos/${team.team_name.toLowerCase().replace(/[^a-z0-9]/g, '-')}.png`;
                        logoImg.onerror = function() {
                            this.onerror = null;
                            this.src = team.logo_url || '/images/Scoonies.jpg';
                        };
                        
                        const nameSpan = document.createElement('span');
                        nameSpan.className = 'team-name';
                        nameSpan.textContent = team.team_name;
                        
                        const regionSpan = document.createElement('span');
                        regionSpan.className = 'team-region';
                        regionSpan.textContent = `(${team.region})`;
                        
                        const mainRow = document.createElement('div');
                        mainRow.className = 'team-main-row';
                        mainRow.appendChild(seedSpan);
                        mainRow.appendChild(logoImg);
                        mainRow.appendChild(nameSpan);
                        mainRow.appendChild(regionSpan);

                        // Status dot + points — colored only once the team has played
                        const hasPlayed = team.round_reached > 1 || team.is_eliminated;
                        const statusWrap = document.createElement('div');
                        statusWrap.className = 'team-status-wrap';

                        if (hasPlayed) {
                            const isAlive = !team.is_eliminated;
                            const dot = document.createElement('span');
                            dot.className = 'status-dot ' + (isAlive ? 'alive' : 'elim');
                            statusWrap.appendChild(dot);
                        }

                        const pointsSpan = document.createElement('span');
                        pointsSpan.className = 'team-points' +
                            (hasPlayed ? (team.is_eliminated ? ' elim' : ' alive') : '');
                        pointsSpan.textContent = `[${team.points_earned} pts]`;
                        statusWrap.appendChild(pointsSpan);

                        mainRow.appendChild(statusWrap);
                        teamItem.appendChild(mainRow);

                        const breakdown = buildBreakdown(team);
                        if (breakdown) {
                            const breakdownDiv = document.createElement('div');
                            breakdownDiv.className = 'team-breakdown';
                            breakdownDiv.textContent = breakdown;
                            teamItem.appendChild(breakdownDiv);
                        }
                        
                        teamList.appendChild(teamItem);
                    });
                    
                    entryTeams.appendChild(teamList);
                }
                
                // Add all elements to the card
                entryCard.appendChild(entryHeader);
                entryCard.appendChild(entryTeams);
                
                // Add card to standings content
                standingsContent.appendChild(entryCard);
            });
        }
    </script>
</body>
</html>
