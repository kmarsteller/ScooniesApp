<!-- bracket.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Scoonies - Tournament Bracket</title>

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="The Scoonies">
    <meta property="og:url" content="https://scoonies.com/bracket.html">
    <meta property="og:title" content="The Scoonies - Tournament Bracket">
    <meta property="og:description" content="Follow the live NCAA Tournament bracket for The Scoonies pool.">
    <meta property="og:image" content="https://scoonies.com/images/Scoonies.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="The Scoonies - Tournament Bracket">
    <meta name="twitter:description" content="Follow the live NCAA Tournament bracket for The Scoonies pool.">
    <meta name="twitter:image" content="https://scoonies.com/images/Scoonies.jpg">

    <link rel="stylesheet" href="/css/style.css">
    <style>
        .main-title {
            text-align: center;
            font-size: 36px;
            color: #dc3545;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .bracket-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85em;
            color: #495057;
        }

        .legend-swatch {
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 1px solid #ccc;
        }

        .legend-swatch.winner  { background-color: rgba(40, 167, 69, 0.25); }
        .legend-swatch.elim    { background-color: #f8d7da; }
        .legend-swatch.pending { background-color: #fff; }
        .legend-swatch.tbd     { background-color: #f0f0f0; }

        /* ── Region tabs ── */
        #bracket-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
            flex-wrap: nowrap;
        }

        .bracket-tab {
            flex: 1;
            padding: 10px 8px;
            text-align: center;
            background: #f8f9fa;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9em;
            color: #495057;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            user-select: none;
            white-space: nowrap;
        }

        .bracket-tab:hover {
            background: #f0f0f0;
            border-color: #aaa;
        }

        .bracket-tab.active {
            background: #dc3545;
            border-color: #dc3545;
            color: #fff;
        }

        .tab-short { display: none; }

        @media (max-width: 600px) {
            .bracket-tab {
                font-size: 0.75em;
                padding: 10px 4px;
            }
            .tab-full  { display: none; }
            .tab-short { display: inline; }
        }

        .refresh-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            margin-bottom: 15px;
        }
        .bracket-hint {
            font-size: 0.85rem;
            color: #6c757d;
            font-style: italic;
        }

        /* ── Region ── */
        .region-section {
            margin-bottom: 35px;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .region-title {
            background-color: #f8f9fa;
            color: #dc3545;
            padding: 12px 20px;
            font-size: 22px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .bracket-container {
            display: flex;
            padding: 15px;
            overflow-x: auto;
        }

        .bracket-rtl { flex-direction: row-reverse; }

        /* ── Rounds ── */
        .round {
            min-width: 190px;
            margin: 0 8px;
            display: flex;
            flex-direction: column;
        }

        .round-title {
            text-align: center;
            padding: 8px;
            background-color: #f8f9fa;
            border-radius: 4px;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 0.85em;
            color: #495057;
        }

        .round-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }

        .matchup-slot {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .round-1 .matchup-slot { min-height: 90px;  margin-bottom: 12px; }
        .round-2 .matchup-slot { min-height: 110px; margin-bottom: 28px; }
        .round-3 .matchup-slot { min-height: 130px; margin-bottom: 55px; }
        .round-4 .matchup-slot { min-height: 110px; }

        .matchup {
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        /* ── Teams ── */
        .team {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            min-height: 40px;
        }

        .team:last-child { border-bottom: none; }

        .team.winner {
            background-color: rgba(40, 167, 69, 0.2);
        }

        .team.eliminated {
            color: #721c24;
            text-decoration: line-through;
            background-color: #f8d7da;
        }

        .team.tbd {
            color: #aaa;
            font-style: italic;
            background-color: #f0f0f0;
            justify-content: center;
        }

        .team-seed {
            width: 22px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85em;
            background-color: #f0f0f0;
            padding: 3px;
            border-radius: 3px;
            margin-right: 8px;
            flex-shrink: 0;
        }

        .team.eliminated .team-seed { background-color: #f5c6cb; }

        .team-logo {
            width: 24px;
            height: 24px;
            margin-right: 8px;
            object-fit: contain;
            flex-shrink: 0;
        }

        .team-name {
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Final Four ── */
        .final-four-section {
            margin-bottom: 35px;
            border: 2px solid #dc3545;
            border-radius: 8px;
            overflow: hidden;
        }

        .final-four-title {
            background-color: #dc3545;
            color: white;
            padding: 12px 20px;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
        }

        .final-four-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .semifinals-row {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            flex-wrap: wrap;
        }

        .semifinal-block {
            width: 280px;
        }

        .semifinal-label {
            text-align: center;
            font-weight: bold;
            color: #495057;
            margin-bottom: 8px;
            font-size: 0.9em;
        }

        .championship-block {
            width: 280px;
        }

        .championship-label {
            text-align: center;
            padding: 8px;
            background-color: #ffc107;
            color: #212529;
            border-radius: 4px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .champion-block {
            text-align: center;
            margin-top: 10px;
        }

        .champion-label {
            font-size: 1.1em;
            color: #dc3545;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .champion-team {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 20px;
            background-color: gold;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .champion-team img {
            width: 36px;
            height: 36px;
            object-fit: contain;
        }

        .loading-message {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
        }

        /* ── Who picked this team popup ── */
        .team:not(.tbd) {
            cursor: pointer;
        }
        .team:not(.tbd):hover {
            filter: brightness(0.95);
        }

        #picks-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
        }

        #picks-popup {
            display: none;
            position: fixed;
            z-index: 1000;
            background: #fff;
            border: 2px solid #dc3545;
            border-radius: 8px;
            padding: 12px 16px;
            min-width: 180px;
            max-width: 280px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            font-size: 0.9em;
        }
        #picks-popup .picks-handle {
            display: none;
        }
        #picks-popup .picks-header {
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 8px;
            font-size: 1em;
        }
        #picks-popup .picks-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        #picks-popup .picks-list li {
            padding: 3px 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            gap: 12px;
        }
        #picks-popup .picks-list li:last-child {
            border-bottom: none;
        }
        #picks-popup .pick-score {
            color: #6c757d;
            font-size: 0.85em;
            white-space: nowrap;
        }
        #picks-popup .picks-none {
            color: #6c757d;
            font-style: italic;
        }

        /* ── Mobile: transform popup into a bottom sheet ── */
        @media (max-width: 600px) {
            #picks-popup {
                left: 0 !important;
                right: 0 !important;
                top: auto !important;
                bottom: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
                min-width: unset !important;
                border-radius: 16px 16px 0 0 !important;
                border-left: none !important;
                border-right: none !important;
                border-bottom: none !important;
                padding: 8px 20px 36px !important;
            }
            #picks-popup .picks-handle {
                display: block;
                width: 40px;
                height: 4px;
                background: #ddd;
                border-radius: 2px;
                margin: 0 auto 14px;
            }
            #picks-popup .picks-header {
                font-size: 1.1em;
                margin-bottom: 12px;
            }
            #picks-popup .picks-list li {
                padding: 8px 0;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-top">
            <a href="/"><img src="../images/Scoonies.jpg" alt="The Scoonies Logo"></a>
        </div>
        <nav>
            <a href="/">About</a>
            <a href="/submit.html">Make a Scoonie</a>
            <a href="/standings.html">Standings</a>
            <a href="/bracket.html" class="active">Bracket</a>
            <a href="/admin">Admin</a>
        </nav>
    </header>

    <main>
        <h1 class="main-title">Tournament Bracket</h1>

        <div class="bracket-legend">
            <div class="legend-item"><div class="legend-swatch winner"></div> Advanced</div>
            <div class="legend-item"><div class="legend-swatch elim"></div> Eliminated</div>
            <div class="legend-item"><div class="legend-swatch pending"></div> In Play</div>
            <div class="legend-item"><div class="legend-swatch tbd"></div> TBD</div>
        </div>

        <div id="bracket-tabs"></div>

        <div class="refresh-row">
            <span class="bracket-hint">Click any team to see who picked them</span>
            <button id="refreshBtn" class="action-button">Refresh</button>
        </div>

        <div id="bracketContent">
            <div class="loading-message">Loading bracket...</div>
        </div>
    </main>

    <div id="picks-overlay"></div>
    <div id="picks-popup">
        <div class="picks-handle"></div>
        <div class="picks-header" id="picks-title"></div>
        <ul class="picks-list" id="picks-list"></ul>
    </div>

    <footer>
        <p>&copy; <script>document.write(new Date().getFullYear())</script> The Scoonies</p>
    </footer>

    <script>
        // ── Seed group definitions ──────────────────────────────────────────
        const R1_MATCHUPS = [[1,16],[8,9],[5,12],[4,13],[6,11],[3,14],[7,10],[2,15]];

        const R2_GROUPS = [
            [1,8,9,16],
            [4,5,12,13],
            [3,6,11,14],
            [2,7,10,15]
        ];

        const R3_GROUPS = [
            [1,4,5,8,9,12,13,16],
            [2,3,6,7,10,11,14,15]
        ];

        // Round 4: whole region — handled inline

        // ── Logo helper ─────────────────────────────────────────────────────
        function logoSrc(teamName) {
            return `/images/logos/${teamName.toLowerCase().replace(/[^a-z0-9]/g, '-')}.png`;
        }

        function makeTeamDiv(team, roundNum) {
            const div = document.createElement('div');
            div.className = 'team';

            if (team.is_eliminated && team.round_reached === roundNum) {
                div.classList.add('eliminated'); // lost in this round
            } else if (team.round_reached > roundNum) {
                div.classList.add('winner'); // advanced past this round
            }

            const seed = document.createElement('span');
            seed.className = 'team-seed';
            seed.textContent = team.seed;

            const logo = document.createElement('img');
            logo.className = 'team-logo';
            logo.alt = team.team_name;
            logo.src = team.logo_url || logoSrc(team.team_name);
            if (!team.logo_url) {
                // Real team: fall back through ESPN URL if local file missing
                logo.onerror = function() {
                    this.onerror = null;
                    this.src = '/images/Scoonies.jpg';
                };
            }

            const name = document.createElement('span');
            name.className = 'team-name';
            name.textContent = team.team_name;

            div.appendChild(seed);
            div.appendChild(logo);
            div.appendChild(name);

            // Click → show who picked this team
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                showPicksPopup(team.team_name, team.region, e.currentTarget);
            });

            return div;
        }

        // ── Build a TBD placeholder div ─────────────────────────────────────
        function makeTBD() {
            const div = document.createElement('div');
            div.className = 'team tbd';
            div.textContent = 'TBD';
            return div;
        }

        // ── Build a matchup box from a list of teams ─────────────────────────
        function makeMatchup(teams, roundNum) {
            const box = document.createElement('div');
            box.className = 'matchup';

            if (teams.length === 0) {
                box.appendChild(makeTBD());
                box.appendChild(makeTBD());
            } else if (teams.length === 1) {
                box.appendChild(makeTeamDiv(teams[0], roundNum));
                box.appendChild(makeTBD());
            } else {
                teams.forEach(t => box.appendChild(makeTeamDiv(t, roundNum)));
            }
            return box;
        }

        // ── Build a round column ─────────────────────────────────────────────
        function makeRound(roundNum, roundName, slots) {
            const col = document.createElement('div');
            col.className = `round round-${roundNum}`;

            const title = document.createElement('div');
            title.className = 'round-title';
            title.textContent = roundName;
            col.appendChild(title);

            const content = document.createElement('div');
            content.className = 'round-content';

            slots.forEach(teams => {
                const slot = document.createElement('div');
                slot.className = 'matchup-slot';
                slot.appendChild(makeMatchup(teams, roundNum));
                content.appendChild(slot);
            });

            col.appendChild(content);
            return col;
        }

        // ── Build slots for each round ───────────────────────────────────────
        function buildSlots(regionTeams, roundNum, groups) {
            return groups.map(seedGroup => {
                if (roundNum === 1) {
                    // Always show both seeded teams
                    return seedGroup.map(s => regionTeams.find(t => t.seed === s)).filter(Boolean);
                }
                // For rounds 2+: teams that have reached this round
                return regionTeams.filter(t =>
                    seedGroup.includes(t.seed) && t.round_reached >= roundNum
                );
            });
        }

        // ── Build a region section ───────────────────────────────────────────
        function makeRegionSection(regionName, regionTeams) {
            const section = document.createElement('div');
            section.className = 'region-section';
            section.dataset.region = regionName;

            const title = document.createElement('div');
            title.className = 'region-title';
            title.textContent = regionName + ' Region';
            section.appendChild(title);

            const container = document.createElement('div');
            container.className = 'bracket-container';
            if (regionName === 'West' || regionName === 'Midwest') {
                container.classList.add('bracket-rtl');
            }

            // Round 1
            container.appendChild(makeRound(1, 'Round of 64',
                buildSlots(regionTeams, 1, R1_MATCHUPS)));

            // Round 2
            container.appendChild(makeRound(2, 'Round of 32',
                buildSlots(regionTeams, 2, R2_GROUPS)));

            // Round 3
            container.appendChild(makeRound(3, 'Sweet 16',
                buildSlots(regionTeams, 3, R3_GROUPS)));

            // Round 4 — single slot, whole region
            const r4Teams = regionTeams.filter(t => t.round_reached >= 4);
            container.appendChild(makeRound(4, 'Elite 8', [r4Teams]));

            section.appendChild(container);
            return section;
        }

        // ── Build Final Four + Championship ─────────────────────────────────
        function makeFinalFourSection(allTeams, finalFourMatchups) {
            const section = document.createElement('div');
            section.className = 'final-four-section';
            section.dataset.region = 'Final Four';

            const title = document.createElement('div');
            title.className = 'final-four-title';
            title.textContent = 'Final Four & Championship';
            section.appendChild(title);

            const body = document.createElement('div');
            body.className = 'final-four-body';

            // ── Determine semifinal pairings ──
            let sf1Regions, sf2Regions;
            if (finalFourMatchups) {
                sf1Regions = finalFourMatchups.semifinal1; // e.g. ["East","West"]
                sf2Regions = finalFourMatchups.semifinal2; // e.g. ["South","Midwest"]
            } else {
                // Fallback: first two vs last two alphabetically
                const regions = [...new Set(allTeams.map(t => t.region))].sort();
                sf1Regions = [regions[0] || 'TBD', regions[1] || 'TBD'];
                sf2Regions = [regions[2] || 'TBD', regions[3] || 'TBD'];
            }

            const sf1Teams = allTeams.filter(t => sf1Regions.includes(t.region) && t.round_reached >= 5);
            const sf2Teams = allTeams.filter(t => sf2Regions.includes(t.region) && t.round_reached >= 5);

            // ── Semifinals row ──
            const sfRow = document.createElement('div');
            sfRow.className = 'semifinals-row';

            function makeSFBlock(teams, label) {
                const block = document.createElement('div');
                block.className = 'semifinal-block';
                const lbl = document.createElement('div');
                lbl.className = 'semifinal-label';
                lbl.textContent = label;
                block.appendChild(lbl);
                block.appendChild(makeMatchup(teams, 5));
                return block;
            }

            sfRow.appendChild(makeSFBlock(sf1Teams,
                `${sf1Regions[0]} vs ${sf1Regions[1]}`));
            sfRow.appendChild(makeSFBlock(sf2Teams,
                `${sf2Regions[0]} vs ${sf2Regions[1]}`));

            body.appendChild(sfRow);

            // ── Championship ──
            const champTeams = allTeams.filter(t => t.round_reached >= 6);
            const champBlock = document.createElement('div');
            champBlock.className = 'championship-block';
            const champLabel = document.createElement('div');
            champLabel.className = 'championship-label';
            champLabel.textContent = 'Championship';
            champBlock.appendChild(champLabel);
            champBlock.appendChild(makeMatchup(champTeams, 6));
            body.appendChild(champBlock);

            // ── Champion ──
            const champion = allTeams.find(t => t.is_champion);
            if (champion) {
                const champBanner = document.createElement('div');
                champBanner.className = 'champion-block';

                const champTitle = document.createElement('div');
                champTitle.className = 'champion-label';
                champTitle.textContent = '🏆 Champion';
                champBanner.appendChild(champTitle);

                const champTeamDiv = document.createElement('div');
                champTeamDiv.className = 'champion-team';

                const logo = document.createElement('img');
                logo.alt = champion.team_name;
                logo.src = champion.logo_url || logoSrc(champion.team_name);
                logo.onerror = function() { this.onerror = null; this.src = '/images/Scoonies.jpg'; };

                champTeamDiv.appendChild(logo);
                champTeamDiv.appendChild(document.createTextNode(
                    `#${champion.seed} ${champion.team_name} (${champion.region})`));
                champTeamDiv.style.cursor = 'pointer';
                champTeamDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showPicksPopup(champion.team_name, champion.region, champTeamDiv);
                });
                champBanner.appendChild(champTeamDiv);
                body.appendChild(champBanner);
            }

            section.appendChild(body);
            return section;
        }

        // ── Tab switching ────────────────────────────────────────────────────
        const SHORT_LABELS = { 'Midwest': 'Mid', 'Final Four': 'FF' };

        function buildTabs(regionNames) {
            const tabBar = document.getElementById('bracket-tabs');
            tabBar.innerHTML = '';

            const allTabs = [...regionNames, 'Final Four'];
            allTabs.forEach((name, i) => {
                const short = SHORT_LABELS[name] || name;
                const tab = document.createElement('div');
                tab.className = 'bracket-tab' + (i === 0 ? ' active' : '');
                tab.dataset.region = name;
                tab.innerHTML = `<span class="tab-full">${name}</span><span class="tab-short">${short}</span>`;
                tab.addEventListener('click', () => switchTab(name));
                tabBar.appendChild(tab);
            });
        }

        function switchTab(regionName) {
            // Update tab active state
            document.querySelectorAll('.bracket-tab').forEach(t => {
                t.classList.toggle('active', t.dataset.region === regionName);
            });

            // Show/hide sections
            document.querySelectorAll('#bracketContent [data-region]').forEach(s => {
                s.style.display = s.dataset.region === regionName ? '' : 'none';
            });

            closePopup();
        }

        // ── Main render ──────────────────────────────────────────────────────
        function renderBracket(data) {
            const content = document.getElementById('bracketContent');
            content.innerHTML = '';

            // Group by region
            const regionMap = {};
            data.teams.forEach(t => {
                if (!regionMap[t.region]) regionMap[t.region] = [];
                regionMap[t.region].push(t);
            });

            const REGION_ORDER = ['East', 'South', 'West', 'Midwest'];
            const regionNames = REGION_ORDER.filter(r => regionMap[r]);
            regionNames.forEach(region => {
                content.appendChild(makeRegionSection(region, regionMap[region]));
            });

            content.appendChild(makeFinalFourSection(data.teams, data.finalFourMatchups));

            // Build tabs and show first region by default
            buildTabs(regionNames);
            switchTab(regionNames[0]);
        }

        // ── Fetch & load ─────────────────────────────────────────────────────
        function loadBracket() {
            fetch('/api/bracket')
                .then(r => { if (!r.ok) throw new Error('Failed'); return r.json(); })
                .then(renderBracket)
                .catch(() => {
                    document.getElementById('bracketContent').innerHTML =
                        '<div class="error">Error loading bracket. Please try again.</div>';
                });
        }

        document.addEventListener('DOMContentLoaded', loadBracket);
        document.getElementById('refreshBtn').addEventListener('click', loadBracket);

        // ── Who picked this team popup ────────────────────────────────────────
        const popup = document.getElementById('picks-popup');
        const overlay = document.getElementById('picks-overlay');
        const popupTitle = document.getElementById('picks-title');
        const popupList = document.getElementById('picks-list');

        function isMobile() {
            return window.innerWidth <= 600;
        }

        function showPicksPopup(teamName, region, anchorEl) {
            // If same team clicked again, close
            if (popup.style.display === 'block' && popup.dataset.team === teamName + region) {
                closePopup();
                return;
            }

            popupTitle.textContent = `${teamName} picks`;
            popupList.innerHTML = '<li style="color:#6c757d;font-style:italic;">Loading…</li>';
            popup.dataset.team = teamName + region;

            if (isMobile()) {
                overlay.style.display = 'block';
            } else {
                positionPopup(anchorEl);
            }
            popup.style.display = 'block';

            fetch(`/api/bracket/picks?team=${encodeURIComponent(teamName)}&region=${encodeURIComponent(region)}`)
                .then(r => r.json())
                .then(data => {
                    popupList.innerHTML = '';
                    if (data.hidden) {
                        popupList.innerHTML = '<li class="picks-none">Selections are hidden</li>';
                    } else if (data.picks.length === 0) {
                        popupList.innerHTML = '<li class="picks-none">Nobody picked this team</li>';
                    } else {
                        data.picks.forEach(p => {
                            const li = document.createElement('li');
                            li.innerHTML = `<span>${p.nickname}</span><span class="pick-score">${p.score} pts</span>`;
                            popupList.appendChild(li);
                        });
                    }
                })
                .catch(() => {
                    popupList.innerHTML = '<li class="picks-none">Error loading picks</li>';
                });
        }

        function positionPopup(anchorEl) {
            const rect = anchorEl.getBoundingClientRect();
            const popupW = 280;
            let left = rect.right + 8;
            let top  = rect.top;

            // Flip left if it would go off-screen
            if (left + popupW > window.innerWidth - 10) {
                left = rect.left - popupW - 8;
            }
            // Keep on screen vertically
            if (top + 200 > window.innerHeight) {
                top = Math.max(8, rect.bottom - 200);
            }
            popup.style.left = left + 'px';
            popup.style.top  = top  + 'px';
        }

        function closePopup() {
            popup.style.display = 'none';
            overlay.style.display = 'none';
            popup.dataset.team = '';
        }

        // Close on outside click (desktop) or overlay tap (mobile)
        document.addEventListener('click', closePopup);
        overlay.addEventListener('click', closePopup);
    </script>
</body>
</html>
